<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>概率对战 Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="page">
      <header class="hero card">
        <p class="badge">Probability Battle</p>
        <h1>概率对战 Demo（Web 版）</h1>
        <p class="subtitle">
          判定值 = 采样值 - 理论期望。双方判定值数学期望都为 0，判定值更大者胜。
        </p>
      </header>

      <section class="status card">
        <h2>当前锁定配置</h2>
        <div class="status-grid">
          <div class="status-row">
            <span class="status-label">敌人</span>
            <span id="enemy-status" class="status-value">未锁定</span>
          </div>
          <div class="status-row">
            <span class="status-label">你</span>
            <span id="player-status" class="status-value">未锁定</span>
          </div>
          <div class="status-row">
            <span class="status-label">固定配置统计</span>
            <span id="fixed-stats" class="status-value">未开始判定</span>
          </div>
        </div>
      </section>

      <section class="layout">
        <aside class="controls card">
          <h2>操作区</h2>

          <div class="step">
            <h3>1. 选择敌人</h3>
            <select id="enemy-select"></select>
            <button id="lock-enemy-btn" type="button">锁定敌人</button>
          </div>

          <div class="step">
            <h3>2. 选择模型</h3>
            <select id="model-select" disabled></select>
            <button id="lock-model-btn" type="button" disabled>锁定模型</button>
          </div>

          <div class="step">
            <h3>3. 选择参数</h3>
            <form id="param-form" class="param-form"></form>
            <button id="lock-params-btn" type="button" disabled>锁定参数</button>
          </div>

          <div class="separator"></div>

          <div class="step action-group">
            <button id="duel-btn" type="button" disabled>开始判定</button>
            <button id="back-param-btn" type="button" disabled>返回参数选择</button>
            <button id="back-model-btn" type="button" disabled>返回模型选择</button>
            <button id="back-enemy-btn" type="button" disabled>返回敌人选择</button>
            <button id="clear-log-btn" type="button">清空记录</button>
          </div>
        </aside>

        <section class="right">
          <article class="card panel">
            <h2>分布说明</h2>
            <div id="distribution-help" class="distribution-help"></div>
          </article>

          <article class="card panel grow">
            <h2>对战记录</h2>
            <pre id="battle-log" class="log"></pre>
          </article>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
